name: "Security & Linting"

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.sh'
      - '**/*.tpl'
      - '**/*.yml'
      - '**/*.yaml'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.sh'
      - '**/*.tpl'
      - '**/*.yml'
      - '**/*.yaml'
      - '.github/workflows/**'

jobs:
  shellcheck:
    name: ShellCheck (Bash Linter)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_paths: 'cache output docs .git'
          severity: 'style'
          format: 'tty'
        env:
          SHELLCHECK_OPTS: "-e SC1091 -e SC1090 -e SC2086"

  codeql:
    name: CodeQL (GitHub Actions)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions   # Hanya Actions (yang relevan)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4