name: Security & Linting

on:
  push:
    branches: [main]
    paths:
      - "**/*.sh"
      - "**/*.tpl"
      - "**/*.yml"
      - "**/*.yaml"
      - .github/workflows/**
  pull_request:
    branches: [main]
    paths:
      - "**/*.sh"
      - "**/*.tpl"
      - "**/*.yml"
      - "**/*.yaml"
      - .github/workflows/**

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck (Bash Linter)
    runs-on: ubuntu-latest
    permissions:
      contents: read	
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d93d1294b7c15b5065558f2d66617d3b # v4.1.7

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@94e178128b397de3f1b413de655d81aa13028212 # v2.0.0
        with:
          scandir: .
          ignore_paths: cache output docs .git
          severity: style
          format: tty
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC1090

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    strategy:
      matrix:
        language: [javascript-typescript, actions]

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d93d1294b7c15b5065558f2d66617d3b # v4.1.7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@2d790406f505036ef40ecba973cc774a50395aac # v3.25.13
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@2d790406f505036ef40ecba973cc774a50395aac # v3.25.13
        with:
          category: /language:${{matrix.language}}
